<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spud Smasher — Idaho Eats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
width: 100%;
height: 100%;
overflow: hidden;
background: #1D1D1D;
font-family: ‘Georgia’, ‘Times New Roman’, serif;
-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none;
-webkit-tap-highlight-color: transparent;
}

.screen {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px;
transition: opacity 0.3s ease;
}

.screen.hidden {
opacity: 0;
pointer-events: none;
z-index: -1;
}

#start-screen {
background: linear-gradient(180deg, #1D1D1D 0%, #2A2A2A 100%);
z-index: 100;
}

.potato-icon {
font-size: 60px;
margin-bottom: 20px;
animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-12px); }
}

.game-title {
font-size: 38px;
font-weight: 700;
color: #fff;
letter-spacing: 2px;
text-align: center;
line-height: 1.1;
margin-bottom: 6px;
}

.game-title span { color: #F1B300; }

.game-subtitle {
font-family: Arial, Helvetica, sans-serif;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: #A7A8AA;
margin-bottom: 32px;
}

.start-btn {
display: block;
width: 220px;
height: 56px;
background: #F1B300;
color: #1D1D1D;
border: none;
font-family: Arial, Helvetica, sans-serif;
font-size: 18px;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
border-radius: 12px;
cursor: pointer;
margin-bottom: 16px;
-webkit-appearance: none;
appearance: none;
touch-action: manipulation;
position: relative;
z-index: 200;
}

.start-btn:active {
background: #d9a200;
transform: scale(0.97);
}

.instructions {
font-family: Arial, sans-serif;
font-size: 14px;
color: #A7A8AA;
text-align: center;
line-height: 1.7;
max-width: 280px;
margin-top: 8px;
}

.instructions strong { color: #F1B300; }

#game-container {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: 1;
display: none;
touch-action: none;
}

#game-container.active {
display: block;
z-index: 10;
}

canvas { display: block; width: 100%; height: 100%; }

#hud {
position: fixed;
top: 0; left: 0; right: 0;
display: none;
justify-content: space-between;
align-items: flex-start;
padding: 16px 16px 20px 16px;
z-index: 50;
background: linear-gradient(180deg, rgba(29,29,29,0.95) 0%, rgba(29,29,29,0) 100%);
pointer-events: none;
}

#hud.active { display: flex; }

.hud-item {
font-family: Arial, Helvetica, sans-serif;
font-size: 16px;
font-weight: 700;
color: #fff;
letter-spacing: 1px;
}

.hud-item span { color: #F1B300; }
.hud-score { font-size: 18px; }
.hud-lives { font-size: 24px; letter-spacing: 4px; }

.hud-time { text-align: center; font-size: 14px; color: #A7A8AA; }
.hud-time span { display: block; font-size: 22px; color: #F1B300; }

/* Streak counter */
#streak-bar {
position: fixed;
bottom: 12px; left: 50%;
transform: translateX(-50%);
z-index: 51;
pointer-events: none;
text-align: center;
display: none;
}

#streak-bar.active { display: block; }

.streak-label {
font-family: Arial, sans-serif;
font-size: 13px;
font-weight: 700;
color: #F1B300;
letter-spacing: 2px;
text-transform: uppercase;
text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.streak-count {
font-family: Georgia, serif;
font-size: 28px;
font-weight: 700;
color: #fff;
text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

/* Frenzy overlay */
.frenzy-flash {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
z-index: 45;
border: 3px solid #F1B300;
animation: frenzyPulse 0.5s ease-in-out infinite;
display: none;
}

.frenzy-flash.active { display: block; }

@keyframes frenzyPulse {
0%, 100% { border-color: rgba(241,179,0,0.3); }
50% { border-color: rgba(241,179,0,0.7); }
}

#end-screen {
background: linear-gradient(180deg, #1D1D1D 0%, #2A2A2A 100%);
z-index: 100;
}

.end-label {
font-family: Arial, Helvetica, sans-serif;
font-size: 12px;
letter-spacing: 3px;
text-transform: uppercase;
color: #A7A8AA;
margin-bottom: 8px;
}

.end-score {
font-size: 64px;
font-weight: 700;
color: #F1B300;
line-height: 1;
margin-bottom: 4px;
}

.end-stats {
font-family: Arial, sans-serif;
font-size: 13px;
color: #666;
margin-bottom: 8px;
}

.end-high-score {
font-family: Arial, sans-serif;
font-size: 15px;
color: #A7A8AA;
margin-bottom: 24px;
}

.end-high-score strong { color: #F1B300; }

.new-record {
font-family: Arial, sans-serif;
font-size: 14px;
color: #F1B300;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 16px;
animation: pulse 1s ease-in-out infinite;
}

.new-record.hidden { display: none; }

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

.end-message {
font-family: Arial, sans-serif;
font-size: 15px;
color: #A7A8AA;
text-align: center;
max-width: 300px;
line-height: 1.5;
margin-bottom: 24px;
}

.made-by {
text-align: center;
margin-top: 24px;
}

.made-by p {
font-family: Arial, sans-serif;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: #A7A8AA;
margin-bottom: 8px;
}

.made-by img { width: 160px; height: auto; }

.combo-popup {
position: fixed;
font-family: Arial, sans-serif;
font-weight: 700;
font-size: 24px;
color: #F1B300;
text-shadow: 0 2px 10px rgba(0,0,0,0.7);
pointer-events: none;
z-index: 60;
animation: comboFade 0.7s ease-out forwards;
}

@keyframes comboFade {
0% { transform: translateY(0) scale(1); opacity: 1; }
100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
}

.smash-ring {
position: fixed;
pointer-events: none;
z-index: 55;
border: 3px solid #F1B300;
border-radius: 50%;
animation: smashExpand 0.4s ease-out forwards;
}

@keyframes smashExpand {
0% { width: 10px; height: 10px; opacity: 1; transform: translate(-50%, -50%) scale(1); }
100% { width: 140px; height: 140px; opacity: 0; transform: translate(-50%, -50%) scale(1); }
}

.smash-ring.bomb { border-color: #ff4444; }

.smash-text {
position: fixed;
pointer-events: none;
z-index: 56;
font-family: Arial, sans-serif;
font-weight: 900;
font-size: 32px;
color: #F1B300;
text-shadow: 0 2px 8px rgba(0,0,0,0.6);
animation: smashTextPop 0.5s ease-out forwards;
}

@keyframes smashTextPop {
0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5) rotate(-10deg); }
30% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); }
100% { opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(0deg) translateY(-40px); }
}

@media (max-width: 480px) {
.game-title { font-size: 32px; }
.potato-icon { font-size: 50px; margin-bottom: 16px; }
.game-subtitle { margin-bottom: 24px; font-size: 10px; }
.start-btn { width: 200px; height: 52px; font-size: 16px; }
.instructions { font-size: 13px; max-width: 260px; }
.end-score { font-size: 56px; }
.hud-item { font-size: 14px; }
.hud-score { font-size: 16px; }
.hud-lives { font-size: 20px; }
.hud-time span { font-size: 18px; }
}

@media (max-height: 600px) {
.potato-icon { font-size: 40px; margin-bottom: 10px; }
.game-title { font-size: 28px; }
.game-subtitle { margin-bottom: 16px; }
.instructions { font-size: 12px; line-height: 1.5; }
.end-score { font-size: 48px; }
}

@media (min-width: 1200px) {
.game-title { font-size: 52px; }
.potato-icon { font-size: 80px; }
.start-btn { width: 280px; height: 64px; font-size: 22px; border-radius: 16px; }
.instructions { font-size: 18px; max-width: 400px; }
.end-score { font-size: 96px; }
.end-message { font-size: 20px; max-width: 400px; }
.hud-item { font-size: 20px; }
.hud-score { font-size: 24px; }
.hud-lives { font-size: 32px; }
.hud-time span { font-size: 28px; }
.made-by img { width: 220px; }
.made-by p { font-size: 13px; }
.combo-popup { font-size: 36px; }
.smash-text { font-size: 48px; }
.streak-label { font-size: 16px; }
.streak-count { font-size: 36px; }
}
</style>

</head>
<body>

<!-- START SCREEN -->

<div id="start-screen" class="screen">
  <div style="margin-bottom:24px; text-align:center;">
    <p style="font-family:Arial,sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#A7A8AA; margin-bottom:8px;">Made by</p>
    <img src="./IdahoEatsLogoWhite.png" alt="Idaho Eats" style="width:180px; height:auto;">
  </div>
  <div class="potato-icon">🥔</div>
  <div class="game-title">SPUD<span>SMASHER</span></div>
  <div class="game-subtitle">Idaho Eats Edition</div>
  <button class="start-btn" id="start-btn" type="button">SMASH!</button>
  <div class="instructions">
    <strong>Swipe</strong> or <strong>drag</strong> to smash the spuds!<br>
    Avoid the bombs 💣<br>
    Miss 3 potatoes = game over<br>
    <strong>Build combos for bonus points!</strong>
  </div>
</div>

<!-- GAME AREA -->

<div id="game-container">
  <canvas id="game-canvas"></canvas>
</div>

<!-- HUD -->

<div id="hud">
  <div class="hud-item hud-score">SCORE: <span id="score-display">0</span></div>
  <div class="hud-item hud-time"><span id="time-display">60</span>sec</div>
  <div class="hud-item hud-lives" id="lives-display">🥔🥔🥔</div>
</div>

<!-- STREAK BAR -->

<div id="streak-bar">
  <div class="streak-label" id="streak-label">STREAK</div>
  <div class="streak-count" id="streak-count">0</div>
</div>

<!-- FRENZY BORDER -->

<div class="frenzy-flash" id="frenzy-flash"></div>

<!-- END SCREEN -->

<div id="end-screen" class="screen hidden">
  <div class="potato-icon" style="animation-duration:3s;">🥔</div>
  <div class="end-label">Your Score</div>
  <div class="end-score" id="final-score">0</div>
  <div class="end-stats" id="end-stats"></div>
  <div class="new-record hidden" id="new-record">⭐ NEW HIGH SCORE ⭐</div>
  <div class="end-high-score">Best: <strong id="high-score-display">0</strong></div>
  <div class="end-message" id="end-message"></div>
  <button class="start-btn" id="restart-btn" type="button">PLAY AGAIN</button>
  <div class="made-by">
    <p>Made by</p>
    <img src="./IdahoEatsLogoWhite.png" alt="Idaho Eats">
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== CONFIG =====
  var GAME_DURATION = 60;
  var MAX_LIVES = 3;
  var GRAVITY = 0.15;
  var COMBO_WINDOW = 600;

  // Difficulty ramps over time (0-1 progress)
  function getLaunchInterval(prog) {
    // Starts at 1200ms, drops to 500ms (was 300 — too hectic)
    return Math.max(500, 1200 - prog * 700);
  }
  function getBombChance(prog) {
    // 8% -> 30%
    return 0.08 + prog * 0.22;
  }
  function getMultiLaunchChance(prog) {
    // 10% -> 60%
    return 0.1 + prog * 0.5;
  }
  function getTripleLaunchChance(prog) {
    // 0% -> 35%
    return Math.max(0, (prog - 0.3) * 0.5);
  }
  function getSpeedMultiplier(prog) {
    // 1.0 -> 1.25 (gentler ramp — difficulty comes from frequency, not speed)
    return 1.0 + prog * 0.25;
  }

  var TYPES = [
    { emoji: '🥔', pts: 1 },
    { emoji: '🍠', pts: 2 },
    { emoji: '🥔', pts: 1 }
  ];
  // Golden potato — rare, worth 5 pts
  var GOLDEN = { emoji: '🌟', pts: 5 };
  var BOMB = { emoji: '💣', pts: 0 };

  var SMASH_WORDS = ['SMASH!', 'BOOM!', 'MASHED!', 'SPLAT!', 'POW!', 'WHAM!', 'CRUSHED!'];

  var MSGS = [
    { s: 0, m: "Keep practicing, Vandal! Those spuds won't smash themselves." },
    { s: 20, m: "Not bad! You're getting warmed up." },
    { s: 40, m: "Solid smashing! You've got some serious skills." },
    { s: 60, m: "Impressive! You're a certified Spud Smasher!" },
    { s: 80, m: "Elite! Your smashing game is top tier!" },
    { s: 100, m: "LEGENDARY! You are the ultimate Spud Smasher champion!" }
  ];

  // ===== ELEMENTS =====
  var startScreen = document.getElementById('start-screen');
  var endScreen = document.getElementById('end-screen');
  var gameContainer = document.getElementById('game-container');
  var hudEl = document.getElementById('hud');
  var scoreEl = document.getElementById('score-display');
  var timeEl = document.getElementById('time-display');
  var livesEl = document.getElementById('lives-display');
  var finalEl = document.getElementById('final-score');
  var highEl = document.getElementById('high-score-display');
  var newRecEl = document.getElementById('new-record');
  var msgEl = document.getElementById('end-message');
  var endStatsEl = document.getElementById('end-stats');
  var streakBar = document.getElementById('streak-bar');
  var streakLabel = document.getElementById('streak-label');
  var streakCount = document.getElementById('streak-count');
  var frenzyFlash = document.getElementById('frenzy-flash');
  var canvas = document.getElementById('game-canvas');
  var ctx = canvas.getContext('2d');

  // ===== STATE =====
  var W, H, dpr;
  var score, lives, gameTime, running, lastFrame, startTime;
  var potatoes, particles, pointerTrail;
  var lastLaunch, comboCount, lastSmash, pointerDown;
  var totalSmashed, bestStreak, currentStreak;
  var inFrenzy, frenzyTimer;
  var highScore = 0;
  var raf;

  try { highScore = parseInt(localStorage.getItem('spudHS3') || '0'); } catch(e) {}
  highEl.textContent = highScore;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function spudSize() {
    var base = Math.min(W, H) * 0.085;
    return Math.max(42, Math.min(base, 75));
  }

  // ===== POTATO =====
  function Potato(type, isBomb, isGolden, speedMult) {
    var sz = spudSize() + Math.random() * 12;
    if (isGolden) {
      this.type = GOLDEN;
      this.isBomb = false;
      this.isGolden = true;
    } else if (isBomb) {
      this.type = BOMB;
      this.isBomb = true;
      this.isGolden = false;
    } else {
      this.type = type;
      this.isBomb = false;
      this.isGolden = false;
    }
    this.sz = sz;

    // Launch zones: optimized for standing play on tall vertical touch displays
    // Peak zone should be 25%-50% from top (chest/arm height for standing person)
    // Screen is very tall portrait, so launches need serious upward power
    var heightFactor = Math.max(1, H / 600); // Tall screens get much stronger launches
    var slow = 0.67; // Global speed scale — slows everything 33%
    var launchZone = Math.random();
    if (launchZone < 0.05) {
      // From left side (rare)
      this.x = -sz;
      this.y = H * (0.2 + Math.random() * 0.2);
      var spd = (5 + Math.random() * 3) * speedMult * slow;
      this.vx = spd * 0.8;
      this.vy = -(spd * 0.15 + Math.random());
    } else if (launchZone < 0.10) {
      // From right side (rare)
      this.x = W + sz;
      this.y = H * (0.2 + Math.random() * 0.2);
      var spd2 = (5 + Math.random() * 3) * speedMult * slow;
      this.vx = -(spd2 * 0.8);
      this.vy = -(spd2 * 0.15 + Math.random());
    } else {
      // From bottom — biased toward chest height on tall display
      this.x = Math.random() * (W - sz * 2) + sz;
      this.y = H + sz;
      var ang3 = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
      this.vx = Math.cos(ang3) * 1.8 * speedMult * slow;

      var heightRoll = Math.random();
      if (heightRoll < 0.10) {
        // Low-ish — peaks around 55-65% from top (waist height, 10%)
        this.vy = -(9 + Math.random() * 2) * speedMult * heightFactor * slow;
      } else if (heightRoll < 0.70) {
        // Chest height sweet spot — peaks around 30-45% from top (60%)
        this.vy = -(11.5 + Math.random() * 3) * speedMult * heightFactor * slow;
      } else if (heightRoll < 0.90) {
        // High — peaks around 15-30% from top (20%)
        this.vy = -(14 + Math.random() * 2) * speedMult * heightFactor * slow;
      } else {
        // Very high — near top (10%)
        this.vy = -(15.5 + Math.random() * 2) * speedMult * heightFactor * slow;
      }
    }

    this.rot = Math.random() * 6.28;
    this.rs = (Math.random() - 0.5) * 0.08;
    this.smashed = false;
    this.missed = false;
    this.alpha = 1;
    this.smashTime = 0;
    this.scaleX = 1;
    this.scaleY = 1;
    this.glowPhase = Math.random() * 6.28;
  }

  Potato.prototype.update = function() {
    if (this.smashed) {
      this.smashTime++;
      if (this.smashTime < 5) {
        this.scaleX = 1 + this.smashTime * 0.35;
        this.scaleY = 1 - this.smashTime * 0.15;
      }
      this.alpha -= 0.08;
      return this.alpha > 0;
    }
    this.vy += GRAVITY;
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rs;
    this.glowPhase += 0.1;

    // Missed — fell below screen
    if (this.y > H + this.sz * 2 && !this.isBomb) {
      this.missed = true;
      return false;
    }
    if (this.y > H + 300) return false;
    return true;
  };

  Potato.prototype.draw = function() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.smashed ? 0 : this.rot);
    ctx.scale(this.scaleX, this.scaleY);

    if (this.isBomb && !this.smashed) {
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 15 + Math.sin(this.glowPhase) * 5;
    }
    if (this.isGolden && !this.smashed) {
      ctx.shadowColor = '#F1B300';
      ctx.shadowBlur = 20 + Math.sin(this.glowPhase * 2) * 10;
    }

    ctx.font = this.sz + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.type.emoji, 0, 0);
    ctx.restore();
  };

  Potato.prototype.hitTest = function(px, py) {
    if (this.smashed) return false;
    var dx = px - this.x, dy = py - this.y;
    return Math.sqrt(dx * dx + dy * dy) < this.sz * 0.8;
  };

  // ===== PARTICLE =====
  function Particle(x, y, col, big) {
    this.x = x; this.y = y; this.col = col;
    this.sz = big ? (4 + Math.random() * 7) : (2 + Math.random() * 3);
    var a = Math.random() * 6.28;
    var s = big ? (5 + Math.random() * 10) : (2 + Math.random() * 5);
    this.vx = Math.cos(a) * s;
    this.vy = Math.sin(a) * s;
    this.life = 1;
    this.decay = big ? (0.012 + Math.random() * 0.018) : (0.02 + Math.random() * 0.03);
  }
  Particle.prototype.update = function() {
    this.x += this.vx; this.y += this.vy; this.vy += 0.12; this.vx *= 0.98;
    this.life -= this.decay; return this.life > 0;
  };
  Particle.prototype.draw = function() {
    ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.col;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.sz, 0, 6.28); ctx.fill(); ctx.restore();
  };

  // ===== EFFECTS =====
  function showSmashRing(x, y, isBomb) {
    var el = document.createElement('div');
    el.className = 'smash-ring' + (isBomb ? ' bomb' : '');
    el.style.left = x + 'px'; el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 400);
  }

  function showSmashText(x, y, text) {
    var el = document.createElement('div');
    el.className = 'smash-text';
    el.style.left = x + 'px'; el.style.top = (y - 40) + 'px';
    el.textContent = text || SMASH_WORDS[Math.floor(Math.random() * SMASH_WORDS.length)];
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 500);
  }

  function popup(x, y, txt, color) {
    var el = document.createElement('div');
    el.className = 'combo-popup';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    if (color) el.style.color = color;
    el.textContent = txt;
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 700);
  }

  function spawnSmashParticles(x, y, isBomb, isGolden) {
    if (isBomb) {
      var bcols = ['#ff4444', '#ff6600', '#ff8800', '#ffaa00', '#333'];
      for (var b = 0; b < 22; b++) particles.push(new Particle(x, y, bcols[Math.floor(Math.random() * bcols.length)], true));
    } else if (isGolden) {
      var gcols = ['#F1B300', '#FFD700', '#FFF176', '#FFEB3B', '#fff'];
      for (var g = 0; g < 25; g++) particles.push(new Particle(x, y, gcols[Math.floor(Math.random() * gcols.length)], true));
    } else {
      var cols = ['#F1B300', '#FFD54F', '#C8A84E', '#8B7355', '#FFF176', '#A7A8AA'];
      for (var i = 0; i < 18; i++) particles.push(new Particle(x, y, cols[Math.floor(Math.random() * cols.length)], true));
      for (var j = 0; j < 6; j++) particles.push(new Particle(x, y, '#FFFDE7', false));
    }
  }

  // ===== STREAK / FRENZY =====
  function updateStreak(hit) {
    if (hit) {
      currentStreak++;
      if (currentStreak > bestStreak) bestStreak = currentStreak;

      streakCount.textContent = currentStreak;

      if (currentStreak >= 5 && currentStreak < 10) {
        streakLabel.textContent = '🔥 STREAK';
        streakLabel.style.color = '#FF6600';
      } else if (currentStreak >= 10 && currentStreak < 20) {
        streakLabel.textContent = '🔥🔥 ON FIRE';
        streakLabel.style.color = '#ff4444';
        if (!inFrenzy) startFrenzy();
      } else if (currentStreak >= 20) {
        streakLabel.textContent = '🔥🔥🔥 UNSTOPPABLE';
        streakLabel.style.color = '#F1B300';
      } else {
        streakLabel.textContent = 'STREAK';
        streakLabel.style.color = '#F1B300';
      }

      if (currentStreak >= 3) {
        streakBar.classList.add('active');
      }
    } else {
      currentStreak = 0;
      streakBar.classList.remove('active');
      if (inFrenzy) endFrenzy();
    }
  }

  function startFrenzy() {
    inFrenzy = true;
    frenzyFlash.classList.add('active');
  }

  function endFrenzy() {
    inFrenzy = false;
    frenzyFlash.classList.remove('active');
  }

  // ===== LAUNCH =====
  function launch() {
    var prog = gameTime / GAME_DURATION;
    var bc = getBombChance(prog);
    var speedMult = getSpeedMultiplier(prog);
    var isBomb = Math.random() < bc;

    // Rare golden potato (3% chance, never a bomb)
    var isGolden = !isBomb && Math.random() < 0.03;

    var type = TYPES[Math.floor(Math.random() * TYPES.length)];
    potatoes.push(new Potato(type, isBomb, isGolden, speedMult));

    // Multi-launch
    if (Math.random() < getMultiLaunchChance(prog)) {
      setTimeout(function() {
        if (!running) return;
        var isBomb2 = Math.random() < bc;
        potatoes.push(new Potato(TYPES[Math.floor(Math.random() * TYPES.length)], isBomb2, false, speedMult));
      }, 60 + Math.random() * 150);
    }

    // Triple launch at higher difficulty
    if (Math.random() < getTripleLaunchChance(prog)) {
      setTimeout(function() {
        if (!running) return;
        potatoes.push(new Potato(TYPES[Math.floor(Math.random() * TYPES.length)], false, false, speedMult));
      }, 120 + Math.random() * 200);
    }

    // Quad launch in last 15 seconds
    if (prog > 0.75 && Math.random() < 0.2) {
      setTimeout(function() {
        if (!running) return;
        potatoes.push(new Potato(TYPES[Math.floor(Math.random() * TYPES.length)], Math.random() < bc * 0.5, false, speedMult));
      }, 180 + Math.random() * 150);
    }
  }

  // ===== CHECK SMASH =====
  function checkSmash(px, py) {
    if (!running) return;
    var now = performance.now();
    for (var i = potatoes.length - 1; i >= 0; i--) {
      var p = potatoes[i];
      if (p.smashed) continue;
      if (p.hitTest(px, py)) {
        p.smashed = true;

        if (p.isBomb) {
          lives--;
          updateLives();
          spawnSmashParticles(p.x, p.y, true, false);
          showSmashRing(p.x, p.y, true);
          popup(px, py - 30, '💥 -1', '#ff4444');
          comboCount = 0;
          updateStreak(false);
          if (lives <= 0) endGame();
        } else {
          totalSmashed++;
          comboCount = (now - lastSmash < COMBO_WINDOW) ? comboCount + 1 : 1;
          lastSmash = now;

          var pts = p.type.pts;

          // Combo multiplier
          if (comboCount >= 5) {
            pts = pts * 4;
          } else if (comboCount >= 3) {
            pts = pts * 2 + comboCount;
          }

          // Streak bonus
          if (currentStreak >= 10) pts = Math.ceil(pts * 1.5);

          // Frenzy bonus
          if (inFrenzy) pts = Math.ceil(pts * 1.25);

          score += pts;
          scoreEl.textContent = score;
          updateStreak(true);

          spawnSmashParticles(p.x, p.y, false, p.isGolden);
          showSmashRing(p.x, p.y, false);

          if (p.isGolden) {
            showSmashText(p.x, p.y, '⭐ GOLDEN! ⭐');
            popup(px, py - 25, '+' + pts, '#FFD700');
          } else if (comboCount >= 5) {
            showSmashText(p.x, p.y, comboCount + 'x MEGA!');
            popup(px, py - 25, '+' + pts, '#ff6600');
          } else if (comboCount >= 3) {
            showSmashText(p.x, p.y);
            popup(px, py - 25, comboCount + 'x +' + pts);
          } else {
            showSmashText(p.x, p.y);
            popup(px, py - 25, '+' + pts);
          }
        }
        break;
      }
    }
  }

  function updateLives() {
    livesEl.textContent = '🥔'.repeat(Math.max(0, lives)) + '💔'.repeat(MAX_LIVES - Math.max(0, lives));
  }

  // ===== DRAW =====
  function drawBG() {
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#1D1D1D'); bg.addColorStop(1, '#2A2A2A');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(241,179,0,0.02)'; ctx.lineWidth = 1;
    for (var gx = 0; gx < W; gx += 36) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (var gy = 0; gy < H; gy += 36) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

    // Frenzy background effect
    if (inFrenzy) {
      ctx.fillStyle = 'rgba(241,179,0,0.02)';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawTrail() {
    if (pointerTrail.length < 2) return;
    var now = performance.now();
    pointerTrail = pointerTrail.filter(function(p) { return now - p.t < 100; });
    if (pointerTrail.length < 2) return;

    ctx.save();
    ctx.strokeStyle = inFrenzy ? 'rgba(255,100,0,0.6)' : 'rgba(241,179,0,0.5)';
    ctx.lineWidth = inFrenzy ? 6 : 4;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowColor = inFrenzy ? '#ff6600' : '#F1B300';
    ctx.shadowBlur = inFrenzy ? 12 : 8;
    ctx.beginPath();
    ctx.moveTo(pointerTrail[0].x, pointerTrail[0].y);
    for (var i = 1; i < pointerTrail.length; i++) {
      ctx.lineTo(pointerTrail[i].x, pointerTrail[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }

  // ===== GAME LOOP =====
  function loop(ts) {
    if (!running) return;
    lastFrame = ts;
    gameTime = (ts - startTime) / 1000;
    if (gameTime >= GAME_DURATION) { endGame(); return; }

    var secsLeft = Math.max(0, Math.ceil(GAME_DURATION - gameTime));
    timeEl.textContent = secsLeft;

    // Flash time when low
    if (secsLeft <= 10) {
      timeEl.style.color = secsLeft % 2 === 0 ? '#ff4444' : '#F1B300';
    } else {
      timeEl.style.color = '#F1B300';
    }

    var prog = gameTime / GAME_DURATION;
    var interval = getLaunchInterval(prog);
    if (ts - lastLaunch > interval) { launch(); lastLaunch = ts; }

    potatoes = potatoes.filter(function(p) {
      var alive = p.update();
      if (!alive && p.missed) {
        lives--; updateLives(); updateStreak(false);
        if (lives <= 0) endGame();
      }
      return alive;
    });
    particles = particles.filter(function(p) { return p.update(); });

    ctx.clearRect(0, 0, W, H);
    drawBG();

    // Time bar
    var tl = Math.max(0, 1 - gameTime / GAME_DURATION);
    ctx.fillStyle = 'rgba(241,179,0,0.1)'; ctx.fillRect(0, H - 5, W, 5);
    ctx.fillStyle = tl > 0.15 ? '#F1B300' : '#ff4444'; ctx.fillRect(0, H - 5, W * tl, 5);

    for (var pi = 0; pi < potatoes.length; pi++) potatoes[pi].draw();
    for (var qi = 0; qi < particles.length; qi++) particles[qi].draw();
    drawTrail();

    raf = requestAnimationFrame(loop);
  }

  // ===== START =====
  function startGame() {
    score = 0; lives = MAX_LIVES; gameTime = 0;
    potatoes = []; particles = []; pointerTrail = [];
    comboCount = 0; lastSmash = 0; pointerDown = false;
    totalSmashed = 0; bestStreak = 0; currentStreak = 0;
    inFrenzy = false;
    scoreEl.textContent = '0';
    timeEl.textContent = GAME_DURATION;
    timeEl.style.color = '#F1B300';
    updateLives();

    startScreen.classList.add('hidden');
    startScreen.style.zIndex = '-1';
    endScreen.classList.add('hidden');
    endScreen.style.zIndex = '-1';
    streakBar.classList.remove('active');
    frenzyFlash.classList.remove('active');
    gameContainer.classList.add('active');
    hudEl.classList.add('active');

    resize();
    running = true;
    lastFrame = performance.now();
    startTime = lastFrame;
    lastLaunch = lastFrame;
    raf = requestAnimationFrame(loop);
  }

  // ===== END =====
  function endGame() {
    if (!running) return;
    running = false;
    cancelAnimationFrame(raf);
    gameContainer.classList.remove('active');
    hudEl.classList.remove('active');
    streakBar.classList.remove('active');
    frenzyFlash.classList.remove('active');

    var nr = score > highScore;
    if (nr) { highScore = score; try { localStorage.setItem('spudHS3', highScore.toString()); } catch(e) {} }

    finalEl.textContent = score;
    highEl.textContent = highScore;
    endStatsEl.textContent = totalSmashed + ' smashed · Best streak: ' + bestStreak;
    if (nr && score > 0) { newRecEl.classList.remove('hidden'); } else { newRecEl.classList.add('hidden'); }

    var m = MSGS[0].m;
    for (var i = 0; i < MSGS.length; i++) { if (score >= MSGS[i].s) m = MSGS[i].m; }
    msgEl.textContent = m;

    setTimeout(function() {
      endScreen.style.zIndex = '100';
      endScreen.classList.remove('hidden');
    }, 400);
  }

  // ===== INPUT =====
  function getXY(e) {
    if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function onDown(e) {
    e.preventDefault(); pointerDown = true;
    var p = getXY(e);
    pointerTrail = [{ x: p.x, y: p.y, t: performance.now() }];
    checkSmash(p.x, p.y);
  }

  function onMove(e) {
    e.preventDefault(); if (!pointerDown) return;
    var p = getXY(e);
    pointerTrail.push({ x: p.x, y: p.y, t: performance.now() });
    checkSmash(p.x, p.y);
  }

  function onUp(e) {
    e.preventDefault(); pointerDown = false;
    setTimeout(function() { pointerTrail = []; }, 120);
  }

  gameContainer.addEventListener('mousedown', onDown, false);
  gameContainer.addEventListener('mousemove', onMove, false);
  gameContainer.addEventListener('mouseup', onUp, false);
  gameContainer.addEventListener('mouseleave', onUp, false);
  gameContainer.addEventListener('touchstart', onDown, { passive: false });
  gameContainer.addEventListener('touchmove', onMove, { passive: false });
  gameContainer.addEventListener('touchend', onUp, { passive: false });
  gameContainer.addEventListener('touchcancel', onUp, { passive: false });

  document.getElementById('start-btn').onclick = function(e) { e.preventDefault(); e.stopPropagation(); startGame(); };
  document.getElementById('restart-btn').onclick = function(e) { e.preventDefault(); e.stopPropagation(); startGame(); };

  document.addEventListener('touchmove', function(e) { if (running) e.preventDefault(); }, { passive: false });
  var lt = 0;
  document.addEventListener('touchend', function(e) { var n = Date.now(); if (n - lt < 300) e.preventDefault(); lt = n; }, { passive: false });

})();
</script>

</body>
